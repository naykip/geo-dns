name: Release

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from branch name
        id: vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Merge release branch into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.vars.outputs.branch }}" \
            --title "chore(release): ${{ steps.vars.outputs.version }}" \
            --body "Automated release ${{ steps.vars.outputs.version }}")
          gh pr review "$PR_URL" --approve
          gh pr merge "$PR_URL" --merge

      - name: Create annotated tag
        run: |
          git fetch origin main
          git tag -a "${{ steps.vars.outputs.version }}" origin/main \
            -m "Release ${{ steps.vars.outputs.version }}"
          git push origin "${{ steps.vars.outputs.version }}"

      - name: Merge main back into develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head main \
            --title "chore(release): merge main back into develop after ${{ steps.vars.outputs.version }}" \
            --body "Post-release sync of main → develop")
          gh pr review "$PR_URL" --approve
          gh pr merge "$PR_URL" --merge

      - name: Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.vars.outputs.version }}" \
            --title "${{ steps.vars.outputs.version }}" \
            --target main \
            --generate-notes \
            --verify-tag

      - name: Delete release branch
        run: git push origin --delete "${{ steps.vars.outputs.branch }}"
