name: Approve and Merge PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve and merge'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ inputs.pr_number }} --approve --repo ${{ github.repository }}

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ inputs.pr_number }} --merge --repo ${{ github.repository }}
